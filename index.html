<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compliance Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
        }

        header {
            background: #1a1a2e;
            color: white;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 { font-size: 20px; font-weight: 600; }
        header span { font-size: 13px; opacity: 0.6; }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e5e5;
        }

        .card h2 {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1a1a2e;
        }

        .field { margin-bottom: 16px; }

        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #666;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            background: #fafafa;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #1a1a2e;
            background: white;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle {
            width: 44px;
            height: 24px;
            background: #ddd;
            border-radius: 12px;
            cursor: pointer;
            position: relative;
            transition: background 0.2s;
            border: none;
            outline: none;
        }

        .toggle.on { background: #1a1a2e; }

        .toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.2s;
        }

        .toggle.on::after { transform: translateX(20px); }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: #1a1a2e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }

        button[type="submit"]:hover { opacity: 0.85; }
        button[type="submit"]:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Right panel — output */
        .output-panel {
            grid-column: 2;
            grid-row: 1 / 3;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .agent-log {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 16px;
            min-height: 160px;
            max-height: 200px;
            overflow-y: auto;
        }

        .agent-log p {
            font-size: 12px;
            font-family: 'Courier New', monospace;
            color: #7effa0;
            line-height: 1.8;
        }

        .agent-log .tool { color: #ffd97d; }
        .agent-log .result { color: #74c0fc; }
        .agent-log .error { color: #ff8787; }

        .report-box {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e5e5;
            flex: 1;
            min-height: 400px;
            overflow-y: auto;
        }

        .report-box h2 {
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 16px;
        }

        #report-content {
            font-size: 14px;
            line-height: 1.8;
            color: #333;
            white-space: pre-wrap;
        }

        .placeholder {
            color: #bbb;
            font-size: 14px;
            text-align: center;
            margin-top: 60px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-idle { background: #f0f0f0; color: #888; }
        .badge-running { background: #fff3cd; color: #856404; }
        .badge-done { background: #d4edda; color: #155724; }
        .badge-error { background: #f8d7da; color: #721c24; }

        @media (max-width: 700px) {
            .container { grid-template-columns: 1fr; }
            .output-panel { grid-column: 1; grid-row: auto; }
        }
    </style>
</head>
<body>

<header>
    <div>
        <h1>Compliance Agent</h1>
        <span>AI-native compliance analysis for Indian businesses</span>
    </div>
</header>

<div class="container">

    <!-- Left: Input form -->
    <div class="card">
        <h2>Business Profile</h2>
        <form id="profileForm">

            <div class="field">
                <label>Business name</label>
                <input type="text" id="business_name" placeholder="e.g. Sharma Foods Pvt Ltd" required>
            </div>

            <div class="field">
                <label>Business type</label>
                <input type="text" id="business_type" placeholder="e.g. Restaurant, Software startup">
            </div>

            <div class="field">
                <label>State</label>
                <select id="state">
                    <option>Kerala</option>
                    <option>Maharashtra</option>
                    <option>Karnataka</option>
                    <option>Tamil Nadu</option>
                    <option>Delhi</option>
                    <option>Gujarat</option>
                    <option>Telangana</option>
                    <option>West Bengal</option>
                    <option>Rajasthan</option>
                    <option>Uttar Pradesh</option>
                </select>
            </div>

            <div class="field">
                <label>Employee count</label>
                <input type="number" id="employee_count" placeholder="e.g. 12" min="1">
            </div>

            <div class="field">
                <label>Annual turnover (₹ lakhs)</label>
                <input type="number" id="annual_turnover_lakhs" placeholder="e.g. 45.5" step="0.1">
            </div>

            <div class="field">
                <label>Industry sector</label>
                <input type="text" id="industry_sector" placeholder="e.g. Food & beverage, IT services">
            </div>

            <div class="field">
                <div class="toggle-row">
                    <label style="margin:0">GST registered?</label>
                    <button type="button" class="toggle" id="gst_toggle" onclick="toggleGST()"></button>
                </div>
            </div>

            <div class="field">
                <label>Additional info (optional)</label>
                <textarea id="additional_info" rows="2" 
                    placeholder="e.g. We export to UAE, we have a food truck license..."></textarea>
            </div>

            <button type="submit" id="submitBtn">Analyze compliance</button>
        </form>
    </div>

    <!-- Right: Output -->
    <div class="output-panel">

        <div style="display:flex; align-items:center; justify-content:space-between;">
            <span style="font-size:13px; font-weight:600; color:#444;">Agent activity</span>
            <span class="status-badge badge-idle" id="statusBadge">Idle</span>
        </div>

        <div class="agent-log" id="agentLog">
            <p style="color:#555;">Waiting for analysis to start...</p>
        </div>

        <div class="report-box">
            <h2>Compliance Report</h2>
            <div id="report-content">
                <p class="placeholder">Submit your business profile to generate a compliance report.</p>
            </div>
        </div>

    </div>
</div>

<script>
    let gstValue = false;

    function toggleGST() {
        gstValue = !gstValue;
        document.getElementById('gst_toggle').classList.toggle('on', gstValue);
    }

    function setStatus(type) {
        const badge = document.getElementById('statusBadge');
        badge.className = 'status-badge';
        const map = {
            idle:    ['badge-idle',    'Idle'],
            running: ['badge-running', 'Running'],
            done:    ['badge-done',    'Done'],
            error:   ['badge-error',   'Error']
        };
        badge.classList.add(map[type][0]);
        badge.textContent = map[type][1];
    }

    function logAgent(message, type = 'status') {
        const log = document.getElementById('agentLog');
        const p = document.createElement('p');
        p.textContent = '› ' + message;
        if (type === 'tool_call') p.className = 'tool';
        if (type === 'tool_result') p.className = 'result';
        if (type === 'error') p.className = 'error';
        log.appendChild(p);
        log.scrollTop = log.scrollHeight;
    }

    document.getElementById('profileForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const reportContent = document.getElementById('report-content');
        const agentLog = document.getElementById('agentLog');

        // Reset UI
        submitBtn.disabled = true;
        submitBtn.textContent = 'Analyzing...';
        agentLog.innerHTML = '';
        reportContent.innerHTML = '';
        setStatus('running');

        const profile = {
            business_name:        document.getElementById('business_name').value,
            business_type:        document.getElementById('business_type').value,
            state:                document.getElementById('state').value,
            employee_count:       parseInt(document.getElementById('employee_count').value),
            annual_turnover_lakhs: parseFloat(document.getElementById('annual_turnover_lakhs').value),
            industry_sector:      document.getElementById('industry_sector').value,
            has_gst:              gstValue,
            additional_info:      document.getElementById('additional_info').value
        };

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(profile)
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let reportText = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (!line.startsWith('data: ')) continue;
                    try {
                        const event = JSON.parse(line.slice(6));

                        if (event.type === 'status') {
                            logAgent(event.content, 'status');
                        } else if (event.type === 'tool_call') {
                            logAgent(event.content, 'tool_call');
                        } else if (event.type === 'tool_result') {
                            logAgent(event.content, 'tool_result');
                        } else if (event.type === 'report') {
                            reportText += event.content;
                            reportContent.textContent = reportText;
                        } else if (event.type === 'done') {
                            logAgent(event.content, 'status');
                            setStatus('done');
                        } else if (event.type === 'error') {
                            logAgent(event.content, 'error');
                            setStatus('error');
                        }
                    } catch {}
                }
            }

        } catch (err) {
            logAgent('Connection error: ' + err.message, 'error');
            setStatus('error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = 'Analyze compliance';
        }
    });
</script>

</body>
</html>
